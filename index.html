<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Taboo Mobile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>iTaboo</h1>
      <p>Fais deviner sans dire les mots interdits.</p>
    </header>

    <section class="hud" aria-label="Tableau de bord">
      <div class="chip timer" id="timer">02:00</div>
      <div class="chip score">Score: <span id="score">0</span></div>
    </section>

    <section class="settings" aria-label="Paramètres">
      <label for="difficulty">Niveau</label>
      <select id="difficulty">
        <option value="all">Tous</option>
        <option value="facile">Facile</option>
        <option value="moyen">Moyen</option>
        <option value="difficile">Difficile</option>
      </select>
    </section>

    <section class="card" id="card" aria-live="polite">
      <p class="label">Mot à deviner</p>
      <h2 id="targetWord">Appuie sur Démarrer</h2>
      <p class="label">Mots interdits</p>
      <ul id="forbiddenList"></ul>
    </section>

    <section class="actions" aria-label="Actions carte">
      <button id="guessedBtn" class="btn btn-primary" disabled>Deviné</button>
      <button id="skipBtn" class="btn btn-secondary" disabled>Passé</button>
    </section>

    <section class="transport" aria-label="Contrôle partie">
      <button id="startBtn" class="btn btn-start">Démarrer</button>
      <button id="pauseBtn" class="btn" disabled>Pause</button>
      <button id="resetBtn" class="btn" disabled>Reset</button>
    </section>

    <p class="status" id="status">Sélectionne un niveau puis lance la partie.</p>
  </main>

  <script src="game.js" defer></script>
</body>
</html>
